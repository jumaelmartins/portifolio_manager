name: portfolio-manager-e2e

services:
  e2e-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio_pass
      POSTGRES_DB: portfolio_e2e
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_e2e"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - e2e-pgdata:/var/lib/postgresql/data

volumes:
  e2e-pgdata:
