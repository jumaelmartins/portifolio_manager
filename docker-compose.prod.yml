name: portfolio-manager

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: ghcr.io/jumaelmartins/portfolio-manager-backend:latest
    ports:
      - "3200:3000"
    volumes:
      - uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-24h}
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_SECURE: ${EMAIL_SECURE:-true}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-disabled}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-disabled}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget --quiet --output-document=- http://localhost:3000 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: ghcr.io/jumaelmartins/portfolio-manager-frontend:latest
    ports:
      - "3201:3001"
    environment:
      BACKEND_URL: http://backend:3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SESSION_COOKIE_NAME: pm_session
      VERIFICATION_COOKIE_NAME: pm_verification
      OAUTH_STATE_COOKIE_NAME: pm_oauth_state
      NODE_OPTIONS: --dns-result-order=ipv4first
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
